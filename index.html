<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    
    <!-- SEO Primary -->
    <title>FinFlow — Gerenciamento Financeiro Pessoal Inteligente</title>
    <meta name="description" content="FinFlow é o app gratuito de gerenciamento financeiro pessoal. Controle gastos, defina orçamentos, gerencie cartões de crédito e alcance suas metas financeiras — tudo em um só lugar." />
    <meta name="keywords" content="finanças pessoais, controle de gastos, orçamento, metas financeiras, cartão de crédito, app financeiro, gerenciador financeiro, finflow" />
    <meta name="author" content="FinFlow" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://finflow.app" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#6C5CE7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinFlow" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://finflow.app" />
    <meta property="og:title" content="FinFlow — Suas Finanças Sob Controle Total" />
    <meta property="og:description" content="App gratuito de gerenciamento financeiro. Controle gastos, orçamentos, cartões e metas. Assistente IA incluso. Sem anúncios." />
    <meta property="og:image" content="https://finflow.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FinFlow — Gerenciamento Financeiro Pessoal" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="FinFlow" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FinFlow — Suas Finanças Sob Controle Total" />
    <meta name="twitter:description" content="App gratuito de gerenciamento financeiro pessoal. Controle gastos, cartões, metas e mais — com assistente IA." />
    <meta name="twitter:image" content="https://finflow.app/og-image.png" />
    <meta name="twitter:image:alt" content="FinFlow — Gerenciamento Financeiro Pessoal" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Splash screen shown while React loads -->
      <div id="splash-loader" style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0F0F14;flex-direction:column;gap:16px;">
        <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6C5CE7,#A29BFE);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(108,92,231,0.35);animation:pulse 2s ease-in-out infinite;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2.5"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg>
        </div>
        <div style="font-family:'Inter',sans-serif;font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,#6C5CE7,#A29BFE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">FinFlow</div>
        <style>@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
